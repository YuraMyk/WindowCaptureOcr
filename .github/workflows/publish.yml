name: Publish

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Find project file
        id: find_proj
        shell: pwsh
        run: |
          $proj = Get-ChildItem -Recurse -Filter "*.csproj" | Select-Object -First 1
          echo "path=$($proj.FullName)" >> $env:GITHUB_OUTPUT
          echo "Found: $($proj.FullName)"

      - name: Publish single-file exe
        shell: pwsh
        run: |
          dotnet publish "${{ steps.find_proj.outputs.path }}" `
            -c Release -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o ./out

      - name: Copy clans.json to output
        shell: pwsh
        run: |
          $clans = Get-ChildItem -Recurse -Filter "clans.json" | Select-Object -First 1
          if ($clans) { Copy-Item $clans.FullName ./out/clans.json }

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/WindowCaptureOcr.exe
            out/clans.json